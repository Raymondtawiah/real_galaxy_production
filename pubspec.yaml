name: real_galaxy
description: "Real Galaxy FC - Football Academy Management System"
publish_to: 'none'
version: 5.0.0+5

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.1

  # Firebase - aligned versions for compatibility
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_database: ^12.3.0
  cloud_functions: ^6.2.0

  # Shared Preferences
  shared_preferences: ^2.5.5

  # Device info for logging
  device_info_plus: ^12.4.0

  # URL launcher for password reset links
  url_launcher: ^6.2.2

  # Intl for date formatting
  intl: ^0.20.2

  # HTTP for API calls
  http: ^1.2.0

  # Firebase Storage for video upload
  firebase_storage: ^13.3.0
  file_picker: ^11.0.2
  image_picker: ^1.0.0

  # Video player for playback
  video_player: ^2.8.2

  # Firebase Cloud Messaging for push notifications
  firebase_messaging: ^16.2.0

  # Local notifications for foreground FCM
  flutter_local_notifications: ^17.0.0

  # Email sending (client-side alternative)
  mailer: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # App icon generator
  flutter_launcher_icons: ^0.14.0

  # Native splash screen - REMOVED: causing plugin registration error
  # Use Android XML and iOS Info.plist directly instead

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/

# Flutter launcher icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpeg"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo.jpeg"
  # Custom styling for rounded corners
  icon_foreground_size: 0.8
  icon_background_size: 0.9
  adaptive_icon_padding: 25